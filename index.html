<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Aid Mini Game 01</title>
    <!-- นำเข้า Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #222; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 800px; height: 600px; background-color: #000; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        canvas { display: block; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 10; }
        .active { display: flex; }
        input, button { margin: 5px; padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        button { background-color: #4CAF50; color: white; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 40px; background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 5; display: none; }
        .shop-card-container { display: flex; gap: 10px; margin-top: 20px; }
        .shop-card { background: #333; padding: 15px; border: 2px solid #555; border-radius: 8px; text-align: center; cursor: pointer; width: 150px; }
        .shop-card:hover { border-color: #4CAF50; }
        .lb-entry { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #555; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="topBar" class="top-bar">
        <span id="tb-name">Player: ---</span>
        <span id="tb-energy">Energy: -/5</span>
        <button onclick="logout()" style="padding: 5px 10px; font-size: 12px; background-color: #f44336;">Logout</button>
    </div>

    <!-- หน้าต่าง Login -->
    <div id="loginScreen" class="screen active">
        <h2>First Aid Mini Game 01</h2>
        <input type="text" id="username" placeholder="Username (English only)" pattern="[A-Za-z0-9]+" required>
        <input type="password" id="pincode" placeholder="PIN (4-7 digits)" minlength="4" maxlength="7" required>
        <!-- ซ่อนช่อง Full Name ไว้ก่อน จะแสดงเมื่อสมัครใหม่เท่านั้น -->
        <input type="text" id="fullname" placeholder="Full Name (สำหรับผู้เล่นใหม่เท่านั้น)" style="display: none;">
        <button onclick="handleLogin()" id="btnLogin">Login / Register</button>
        <p id="login-msg" style="color: #ff5555; font-size: 14px;"></p>
    </div>

    <!-- หน้าต่าง Main Menu -->
    <div id="menuScreen" class="screen">
        <h2>Main Menu</h2>
        <button onclick="startGame()" style="font-size: 20px; padding: 15px 30px; margin-bottom: 20px;">Start Game</button>
        <button onclick="showUpgrade()">Permanent Upgrades (เพชร: <span id="menu-diamonds">0</span>)</button>
        <h3>Leaderboard (Top 10)</h3>
        <div id="leaderboardList" style="text-align: left; background: #333; padding: 15px; border-radius: 5px; width: 350px; height: 200px; overflow-y: auto;">
            Loading...
        </div>
    </div>

    <!-- หน้าต่าง ร้านค้ายา (Shop Phase) -->
    <div id="shopScreen" class="screen">
        <h2>Shop Phase <span id="shop-phase-num"></span></h2>
        <p>Coins: <span id="shop-coins">0</span> | Re-roll Cost: <span id="shop-reroll-cost">1</span></p>
        <div class="shop-card-container" id="shopCards">
            <!-- Cards will be injected here -->
        </div>
        <br>
        <button onclick="rerollShop()">Re-roll</button>
        <button onclick="nextPhase()" style="background-color: #2196F3;">Next Phase</button>
    </div>

    <!-- ตัวเกม Canvas -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script>
    // ----------------------------------------------------------------
    // 1. ตั้งค่า Supabase ด้วยคีย์จริงของคุณ
    // ----------------------------------------------------------------
    const SUPABASE_URL = 'https://budgugzxmgmptxycfyeb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1ZGd1Z3p4bWdtcHR4eWNmeWViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODgyNDMsImV4cCI6MjA5OTc2NDI0M30.85-Yr-DDFQa0eioI_rydxhljP96pg24t3GVnj7PrP0E';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ----------------------------------------------------------------
    // 2. ตัวแปรสถานะเกม
    // ----------------------------------------------------------------
    let currentUser = null;
    let gameState = 'LOGIN'; 
    let currentPhase = 1;
    let phaseTimer = 30;
    let lastTime = 0;
    let coins = 0;
    let score = 0;
    let diamonds = 0;
    let rerollCost = 1;
    let isRegistering = false; // ตัวแปรเช็คว่ากำลังอยู่ในโหมดสมัครสมาชิกใหม่หรือไม่

    // Canvas Setup
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const keys = {};

    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    const shopItems = [
        { name: "Tylenol", cost: 10, desc: "รักษาปวดศีรษะ +กระสุน +Atk", type: "heal_headache" },
        { name: "CPM", cost: 10, desc: "รักษาภูมิแพ้ +DEF -SPD", type: "heal_allergy_cpm" },
        { name: "Carbon", cost: 10, desc: "รักษาปวดท้อง +SPD", type: "heal_stomach" },
        { name: "Saline", cost: 10, desc: "Heal HP 2", type: "heal_hp_basic" }
    ];

    // ----------------------------------------------------------------
    // 3. ฟังก์ชันฐานข้อมูล Supabase (Login & Leaderboard)
    // ----------------------------------------------------------------
    async function handleLogin() {
        const userStr = document.getElementById('username').value.trim();
        const pinStr = document.getElementById('pincode').value.trim();
        const fullnameInput = document.getElementById('fullname');
        const fnameStr = fullnameInput.value.trim();
        const msgEl = document.getElementById('login-msg');
        const btn = document.getElementById('btnLogin');

        // ตรวจสอบภาษาอังกฤษเท่านั้น
        if (!/^[A-Za-z0-9]+$/.test(userStr)) {
            msgEl.innerText = "Username ต้องเป็นภาษาอังกฤษและตัวเลขเท่านั้น";
            return;
        }
        if (pinStr.length < 4 || pinStr.length > 7) {
            msgEl.innerText = "PIN ต้องมี 4-7 ตัวอักษร";
            return;
        }

        btn.innerText = "กำลังตรวจสอบ...";
        btn.disabled = true;

        try {
            // 1. ค้นหาผู้เล่นในฐานข้อมูล (ใช้ maybeSingle() เพื่อป้องกัน error ตอนไม่พบข้อมูล)
            const { data: existingPlayer, error: fetchErr } = await supabase
                .from('players')
                .select('*')
                .eq('username', userStr)
                .maybeSingle(); 

            if (fetchErr) throw fetchErr;

            if (existingPlayer) {
                // --- กรณี: ผู้เล่นเก่า ---
                fullnameInput.style.display = 'none'; // ซ่อนเผื่อแสดงอยู่
                isRegistering = false;

                // เช็ค PIN
                if (existingPlayer.pin_code !== pinStr) {
                    msgEl.innerText = "PIN ไม่ถูกต้อง กรุณาลองใหม่";
                    btn.innerText = "Login / Register";
                    btn.disabled = false;
                    return;
                }
                currentUser = existingPlayer;
            } else {
                // --- กรณี: ผู้เล่นใหม่ (ไม่พบในระบบ) ---
                if (!isRegistering) {
                    // ปรับหน้าต่างเข้าโหมดรับชื่อนามสกุลครั้งแรก
                    isRegistering = true;
                    fullnameInput.style.display = 'block'; 
                    msgEl.innerText = "ไม่พบชื่อนี้ในระบบ กรุณากรอกชื่อ-นามสกุล และกดปุ่มอีกครั้งเพื่อสมัครสมาชิก";
                    btn.innerText = "ยืนยันการสมัคร";
                    btn.disabled = false;
                    return;
                }

                // ถ้าอยู่ในโหมดสมัครและกดปุ่มซ้ำ จะตรวจว่ากรอกชื่อเต็มหรือยัง
                if (!fnameStr) {
                    msgEl.innerText = "กรุณากรอก Full Name ให้ครบถ้วนด้วยครับ";
                    btn.innerText = "ยืนยันการสมัคร";
                    btn.disabled = false;
                    return;
                }
                
                // บันทึกผู้เล่นใหม่
                const { data: newPlayer, error: insertErr } = await supabase
                    .from('players')
                    .insert([{ 
                        username: userStr, 
                        pin_code: pinStr, 
                        full_name: fnameStr,
                        diamonds: 0,
                        daily_energy: 5
                    }])
                    .select()
                    .single();

                if (insertErr) throw insertErr;
                currentUser = newPlayer;

                // สร้าง record ใน Leaderboard ให้เริ่มต้นที่ 0
                await supabase.from('leaderboards').insert([{ username: userStr, max_score: 0, max_phase: 1 }]);
                
                // คืนค่าฟอร์มกลับเหมือนเดิมหลังสมัครผ่าน
                fullnameInput.style.display = 'none';
                fullnameInput.value = '';
                isRegistering = false;
            }

            // --- เมื่อ Login สำเร็จ (ทั้งเก่าและใหม่) ---
            msgEl.innerText = "";
            btn.innerText = "Login / Register";
            diamonds = currentUser.diamonds;
            updateTopBar();
            await loadLeaderboard();
            switchScreen('menuScreen');
            gameState = 'MENU';

        } catch (err) {
            console.error(err);
            msgEl.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล";
            btn.innerText = "Login / Register";
        }

        btn.disabled = false;
    }

    async function loadLeaderboard() {
        const lbList = document.getElementById('leaderboardList');
        lbList.innerHTML = "กำลังโหลดข้อมูล...";
        
        try {
            const { data: lbData, error } = await supabase
                .from('leaderboards')
                .select('username, max_score, max_phase')
                .order('max_score', { ascending: false })
                .limit(10);
                
            if (error) throw error;
            
            if (lbData && lbData.length > 0) {
                lbList.innerHTML = lbData.map((p, index) => 
                    `<div class="lb-entry">
                        <span><strong>#${index + 1}</strong> ${p.username}</span>
                        <span>Score: ${p.max_score} (Phase ${p.max_phase})</span>
                    </div>`
                ).join('');
            } else {
                lbList.innerHTML = "ยังไม่มีข้อมูลคะแนน";
            }
        } catch (err) {
            console.error(err);
            lbList.innerHTML = "ไม่สามารถโหลด Leaderboard ได้";
        }
    }

    async function saveScoreToDB() {
        if (!currentUser) return;
        
        try {
            const { data: currentRecord } = await supabase
                .from('leaderboards')
                .select('max_score')
                .eq('username', currentUser.username)
                .maybeSingle();

            const oldScore = currentRecord ? currentRecord.max_score : 0;

            if (score > oldScore) {
                await supabase
                    .from('leaderboards')
                    .upsert({ 
                        username: currentUser.username, 
                        max_score: score, 
                        max_phase: currentPhase,
                        updated_at: new Date()
                    });
                alert(`✨ NEW RECORD! ทำลายสถิติเดิมของคุณแล้ว\nคะแนนใหม่: ${score} (ถึง Phase ${currentPhase})`);
            } else {
                alert(`Game Over!\nScore: ${score} | Phase: ${currentPhase}\n(ยังไม่ผ่านสถิติสูงสุดเดิมของคุณที่ ${oldScore} คะแนน)`);
            }

            await supabase
                .from('players')
                .update({ 
                    diamonds: currentUser.diamonds,
                    daily_energy: currentUser.daily_energy
                })
                .eq('username', currentUser.username);

        } catch (err) {
            console.error('Error saving score:', err);
            alert("บันทึกคะแนนขัดข้อง: " + score);
        }
    }

    function updateTopBar() {
        document.getElementById('tb-name').innerText = `Player: ${currentUser.username}`;
        document.getElementById('tb-energy').innerText = `Energy: ${currentUser.daily_energy}/5`;
        document.getElementById('menu-diamonds').innerText = currentUser.diamonds;
    }

    // ----------------------------------------------------------------
    // 4. คลาสและออบเจ็กต์ในเกม
    // ----------------------------------------------------------------
    class Player {
        constructor() {
            this.x = 400; this.y = 300; this.size = 15;
            this.baseHp = 10; this.hp = 10; this.maxHp = 10;
            this.atk = 1; this.def = 0; 
            this.spd = 3; this.bulletsPerSec = 1; 
            this.fireTimer = 0;
            this.statuses = { headache: 0, allergy: 0, stomach: 0 }; 
        }
        update(dt) {
            let moveSpd = this.spd * 60 * dt;
            if (keys['w'] && this.y > this.size) this.y -= moveSpd;
            if (keys['s'] && this.y < canvas.height - this.size) this.y += moveSpd;
            if (keys['a'] && this.x > this.size) this.x -= moveSpd;
            if (keys['d'] && this.x < canvas.width - this.size) this.x += moveSpd;

            this.fireTimer -= dt;
            if (this.fireTimer <= 0 && enemies.length > 0) {
                this.shootNearest();
                this.fireTimer = 1.0; 
            }
        }
        draw(ctx) {
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'red';
            ctx.fillRect(this.x - 15, this.y - 20, 30, 5);
            ctx.fillStyle = 'green';
            ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 5);
        }
        shootNearest() {
            let nearest = null;
            let minDist = Infinity;
            for (let e of enemies) {
                let dist = Math.hypot(e.x - this.x, e.y - this.y);
                if (dist < minDist) { minDist = dist; nearest = e; }
            }
            if (nearest) {
                let angle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                bullets.push(new Bullet(this.x, this.y, angle, this.atk));
            }
        }
        takeDamage(amt, statusEffect) {
            let dodgeChance = (this.def / 100) * 0.7;
            if (Math.random() < dodgeChance) return; 
            this.hp -= amt;
            if (statusEffect && Math.random() < 0.2) this.applyStatus(statusEffect);
            if (this.hp <= 0) gameOver();
        }
        applyStatus(type) {
            if (this.statuses[type] < 3) this.statuses[type]++;
        }
    }

    class Enemy {
        constructor(type, phase) {
            this.type = type;
            this.size = 12;
            if (Math.random() < 0.5) {
                this.x = Math.random() < 0.5 ? 0 : canvas.width;
                this.y = Math.random() * canvas.height;
            } else {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() < 0.5 ? 0 : canvas.height;
            }
            
            if (type === 1) { this.hp = 1; this.atk = 1; this.spd = 2; this.status = 'headache'; }
            else if (type === 2) { this.hp = 1; this.atk = 1; this.spd = 2; this.status = 'stomach'; }
            else { this.hp = 1; this.atk = 1; this.spd = 1.5; this.status = null; }
        }
        update(dt) {
            let angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.spd * 60 * dt;
            this.y += Math.sin(angle) * this.spd * 60 * dt;
            let dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < this.size + player.size) {
                player.takeDamage(this.atk, this.status);
                this.hp = 0;
            }
        }
        draw(ctx) {
            ctx.fillStyle = 'red';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Bullet {
        constructor(x, y, angle, atk) {
            this.x = x; this.y = y; this.angle = angle;
            this.atk = atk; this.spd = 8; this.size = 4;
            this.active = true;
        }
        update(dt) {
            this.x += Math.cos(this.angle) * this.spd * 60 * dt;
            this.y += Math.sin(this.angle) * this.spd * 60 * dt;
            if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.active = false;
            
            for (let e of enemies) {
                let dist = Math.hypot(e.x - this.x, e.y - this.y);
                if (dist < this.size + e.size) {
                    e.hp -= this.atk;
                    this.active = false;
                    if (e.hp <= 0) {
                        score += 10;
                        coins += 1;
                        if(Math.random() < 0.05) currentUser.diamonds += 1; 
                    }
                    break;
                }
            }
        }
        draw(ctx) {
            ctx.fillStyle = 'yellow';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }

    let player = new Player();
    let enemies = [];
    let bullets = [];
    let enemySpawnTimer = 0;

    // ----------------------------------------------------------------
    // 5. ระบบ UI & Flow
    // ----------------------------------------------------------------
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        if (screenId) document.getElementById(screenId).classList.add('active');
        document.getElementById('topBar').style.display = (currentUser && screenId !== 'loginScreen') ? 'flex' : 'none';
    }

    function logout() {
        currentUser = null;
        // รีเซ็ตค่าหน้าล็อกอินทั้งหมดให้กลับสู่สถานะเริ่มต้น
        document.getElementById('username').value = '';
        document.getElementById('pincode').value = '';
        document.getElementById('fullname').value = '';
        document.getElementById('fullname').style.display = 'none';
        isRegistering = false;
        document.getElementById('login-msg').innerText = '';
        document.getElementById('btnLogin').innerText = 'Login / Register';
        switchScreen('loginScreen');
    }

    async function startGame() {
        if (currentUser.daily_energy <= 0) { 
            alert("พลังงานหมด! กรุณารอรีเซ็ตในวันพรุ่งนี้"); 
            return; 
        }
        
        currentUser.daily_energy -= 1;
        updateTopBar();
        
        await supabase.from('players')
            .update({ daily_energy: currentUser.daily_energy })
            .eq('username', currentUser.username);
        
        player = new Player();
        enemies = [];
        bullets = [];
        currentPhase = 1;
        phaseTimer = 30;
        score = 0;
        coins = 0;
        rerollCost = currentPhase;
        
        switchScreen(null); 
        gameState = 'PLAYING';
        requestAnimationFrame(gameLoop);
    }

    function enterShopPhase() {
        gameState = 'SHOP';
        switchScreen('shopScreen');
        document.getElementById('shop-phase-num').innerText = currentPhase;
        document.getElementById('shop-coins').innerText = coins;
        rerollCost = currentPhase;
        document.getElementById('shop-reroll-cost').innerText = rerollCost;
        rollShopCards();
    }

    function rollShopCards() {
        const container = document.getElementById('shopCards');
        container.innerHTML = '';
        for(let i=0; i<3; i++) {
            let item = shopItems[Math.floor(Math.random() * shopItems.length)];
            let discPrice = Math.ceil(item.cost * 0.3);
            container.innerHTML += `
                <div class="shop-card" onclick="buyItem('${item.name}', ${discPrice})">
                    <h4>${item.name}</h4>
                    <p style="font-size:12px">${item.desc}</p>
                    <p style="color:yellow; font-weight:bold">$${discPrice}</p>
                </div>
            `;
        }
    }

    function rerollShop() {
        if (coins >= rerollCost) {
            coins -= rerollCost;
            rerollCost += 1;
            document.getElementById('shop-coins').innerText = coins;
            document.getElementById('shop-reroll-cost').innerText = rerollCost;
            rollShopCards();
        } else {
            alert("เหรียญไม่พอสำหรับ Reroll");
        }
    }

    function buyItem(name, price) {
        if (coins >= price) {
            coins -= price;
            document.getElementById('shop-coins').innerText = coins;
            alert(`ซื้อ ${name} เรียบร้อย`);
        } else {
            alert("เหรียญไม่พอ!");
        }
    }

    function nextPhase() {
        currentPhase++;
        phaseTimer = 30;
        enemies = [];
        bullets = [];
        gameState = 'PLAYING';
        switchScreen(null);
    }

    async function gameOver() {
        gameState = 'GAMEOVER';
        await saveScoreToDB();
        
        updateTopBar();
        await loadLeaderboard(); 
        switchScreen('menuScreen');
    }

    // ----------------------------------------------------------------
    // 6. Game Loop อัปเดตและวาดภาพ
    // ----------------------------------------------------------------
    function gameLoop(timestamp) {
        if (gameState !== 'PLAYING') return;
        
        let dt = (timestamp - lastTime) / 1000;
        if (dt > 0.1) dt = 0.1;
        lastTime = timestamp;

        update(dt);
        draw();

        requestAnimationFrame(gameLoop);
    }

    function update(dt) {
        phaseTimer -= dt;
        if (phaseTimer <= 0) {
            enterShopPhase();
            return;
        }

        player.update(dt);

        enemySpawnTimer -= dt;
        if (enemySpawnTimer <= 0) {
            let type = Math.random() < 0.7 ? 1 : 2; 
            enemies.push(new Enemy(type, currentPhase));
            enemySpawnTimer = 30 / (20 + (currentPhase * 10)); 
        }

        bullets.forEach(b => b.update(dt));
        bullets = bullets.filter(b => b.active);

        enemies.forEach(e => e.update(dt));
        enemies = enemies.filter(e => e.hp > 0);
    }

    function draw() {
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'white';
        ctx.font = '20px Arial';
        ctx.fillText(`Phase: ${currentPhase}`, 10, 30);
        ctx.fillText(`Time: ${Math.ceil(phaseTimer)}`, 10, 60);
        ctx.fillText(`Score: ${score}`, 10, 90);
        ctx.fillStyle = 'yellow';
        ctx.fillText(`Coins: ${coins}`, 10, 120);
        ctx.fillStyle = 'cyan';
        ctx.fillText(`Diamonds: ${currentUser.diamonds}`, 10, 150);

        player.draw(ctx);
        bullets.forEach(b => b.draw(ctx));
        enemies.forEach(e => e.draw(ctx));
    }
</script>

</body>
</html>
